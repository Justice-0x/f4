<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F4 Cluster Banger – MyGuy.dev</title>
<style>
  body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:radial-gradient(circle at 20% 20%,#00121f,#000814 80%);
    color:#e0f7ff;
    overflow:hidden;
  }
  .fade-container{
    position:absolute;
    width:100%;
    height:100%;
    top:0;left:0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4vw;
    opacity:0;
    animation:fadeIn 4s ease-in-out forwards;
  }
  .fade-container img{
    width:32vw;
    border-radius:1rem;
    box-shadow:0 0 30px rgba(0,255,224,0.35);
    transform:translateY(30px);
    animation:floatUp 5s ease-in-out forwards;
  }
  @keyframes fadeIn{to{opacity:1;}}
  @keyframes floatUp{to{transform:translateY(0);}}
  .login-container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    animation:showLogin 1s ease-in-out 4.5s forwards;
    background:rgba(0,20,30,0.9);
    padding:2rem 3rem;
    border-radius:1rem;
    box-shadow:0 0 40px rgba(0,255,224,0.2);
    text-align:center;
  }
  @keyframes showLogin{to{opacity:1;}}
  input[type=password]{
    padding:0.7rem 1rem;
    border:none;
    border-radius:8px;
    width:80%;
    margin-top:1rem;
    background:#001d2a;
    color:#00ffe0;
    font-size:1.1rem;
  }
  button{
    margin-top:1rem;
    padding:0.7rem 2rem;
    border:none;
    border-radius:8px;
    background:#00ffe0;
    color:#00121f;
    font-weight:600;
    cursor:pointer;
  }
  .shake{animation:shake 0.4s;}
  @keyframes shake{
    0%,100%{transform:translate(-50%,-50%) translateX(0);}
    25%{transform:translate(-50%,-50%) translateX(-10px);}
    75%{transform:translate(-50%,-50%) translateX(10px);}
  }
  footer{
    position:absolute;
    bottom:1rem;
    width:100%;
    text-align:center;
    font-size:0.8rem;
    color:#008d75;
  }
</style>
</head>
<body>
  <div class="fade-container">
    <img src="https://i.imgur.com/ssO7yDk.jpeg" alt="Daikin VRV Unit">
    <img src="https://i.imgur.com/zxDEwv3.jpeg" alt="Control Board">
  </div>
  <div class="login-container" id="login">
    <h2>🔐 MyGuy.dev Access</h2>
    <p>Enter Access Code</p>
    <input type="password" id="pass" placeholder="Enter pass">
    <br>
    <button onclick="checkPass()">Unlock</button>
  </div>
  <footer>© MyGuy.dev Field Intelligence System 2025 – All Rights Reserved</footer>

<script>
  function checkPass(){
    const pass=document.getElementById('pass').value.trim().toLowerCase();
    const box=document.getElementById('login');
    if(pass==='myguy'){
      window.location.href='tech.html';
    }else if(pass==='jude'){
      window.location.href='jude.html';
    }else{
      box.classList.add('shake');
      setTimeout(()=>box.classList.remove('shake'),500);
    }
  }
</script>
</body>
</html>
